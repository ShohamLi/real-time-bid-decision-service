services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: bid_service
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"

  app:
    build: .
    ports:
      - "8000:8000"
    environment:
      FEATURE_STORE_TYPE: "redis"
      REDIS_URL: "redis://redis:6379/0"
      CAMPAIGN_STORE_TYPE: "postgres"
      DATABASE_URL: "postgresql+psycopg://postgres:postgres@postgres:5432/bid_service"
    depends_on:
      - redis
      - postgres
